<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login Form</title>
    <style>
        /* (Your existing CSS remains the same) */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; }
        .strength-meter { height: 4px; width: 100%; background: #eee; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: all 0.5s ease; }
        .toggle-btn { position: absolute; right: 12px; top: 38px; cursor: pointer; color: #764ba2; font-size: 0.85rem; font-weight: bold; }
        button { width: 100%; padding: 14px; background: #764ba2; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Member Login</h2>
        <form id="authForm">
            <div class="input-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" placeholder="e.g. John Doe" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
                <span class="toggle-btn" id="togglePass">SHOW</span>
                <div class="strength-meter"><div id="strength-bar"></div></div>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        const authForm = document.getElementById('authForm');
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePass');
        const strengthBar = document.getElementById('strength-bar');
        const statusMsg = document.getElementById('status-msg');

        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.textContent = isPass ? 'HIDE' : 'SHOW';
        });

        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let width = val.length > 0 ? (val.length <= 4 ? 33 : (val.length <= 8 ? 66 : 100)) : 0;
            let color = val.length <= 4 ? "#ff4d4d" : (val.length <= 8 ? "#ffd11a" : "#2ecc71");
            strengthBar.style.width = width + "%";
            strengthBar.style.background = color;
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('username').value;
            const pass = passInput.value;

            if (pass === "1234") {
                statusMsg.style.color = "#2ecc71";
                statusMsg.textContent = "Redirecting...";
                
                // STEP 1: Save the name so the next page can see it
                localStorage.setItem("userName", name);

                // STEP 2: Move to the next page
                setTimeout(() => {
                    window.location.href = "Task2.html"; 
                }, 1000);
            } else {
                statusMsg.style.color = "#ff4d4d";
                statusMsg.textContent = "Invalid password!";
            }
        });
    </script>
</body>
</html>
